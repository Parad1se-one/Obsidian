<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shrimp body -->
  <ellipse cx="50" cy="55" rx="35" ry="25" fill="#FF6B6B" stroke="#E55A5A" stroke-width="2"/>
  
  <!-- Shrimp head -->
  <circle cx="30" cy="50" r="18" fill="#FF8585" stroke="#E55A5A" stroke-width="2"/>
  
  <!-- Eye -->
  <circle cx="25" cy="45" r="6" fill="white" stroke="#333" stroke-width="1"/>
  <circle cx="25" cy="45" r="3" fill="#333"/>
  <circle cx="27" cy="43" r="1.5" fill="white"/>
  
  <!-- Smile -->
  <path d="M 20 55 Q 25 60 30 55" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Tail -->
  <path d="M 80 55 L 95 45 L 90 55 L 95 65 Z" fill="#FF6B6B" stroke="#E55A5A" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Legs -->
  <path d="M 40 75 L 35 85 M 50 78 L 50 88 M 60 75 L 65 85" stroke="#FF8585" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Antennae -->
  <path d="M 20 40 Q 10 30 5 25" stroke="#FF8585" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 25 35 Q 15 25 10 20" stroke="#FF8585" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="5" cy="25" r="2" fill="#FF8585"/>
  <circle cx="10" cy="20" r="2" fill="#FF8585"/>
  
  <!-- Blush -->
  <ellipse cx="18" cy="52" rx="3" ry="2" fill="#FFB6B6" opacity="0.6"/>
  <ellipse cx="32" cy="52" rx="3" ry="2" fill="#FFB6B6" opacity="0.6"/>
</svg>
