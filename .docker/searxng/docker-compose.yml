version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    network_mode: "container:mihomo-agent"
    environment:
      - SEARXNG_BASE_URL=http://127.0.0.1:8080
      - SEARXNG_SECRET=searxng-secret-key-change-me
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/var/lib/searxng
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  searxng-data:
